services:
  e2e:
    build:
      dockerfile: ./Dockerfile
    command: pnpm test
    volumes:
      - ./specs:/user/src/app/specs
    depends_on:
      - reservations
      - auth
      - payments
      - notifications
      - mongo
  reservations:
    image: asia-south1-docker.pkg.dev/sleepr-485709/reservations/production
    env_file:
      - ../apps/reservations/.env
    ports:
      - '3000:3000'
  auth:
    image: asia-south1-docker.pkg.dev/sleepr-485709/auth/production
    platform: linux/amd64
    env_file:
      - ../apps/auth/.env
    ports:
      - '3001:3000'
  payments:
    image: asia-south1-docker.pkg.dev/sleepr-485709/payments/production
    platform: linux/amd64
    env_file:
      - ../apps/payments/.env
  notifications:
    image: asia-south1-docker.pkg.dev/sleepr-485709/notifications/production
    platform: linux/amd64
    env_file:
      - ../apps/notifications/.env
  mongo:
    image: mongo
