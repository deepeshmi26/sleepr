apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: auth
  name: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - image: asia-south1-docker.pkg.dev/sleepr-485709/auth/production
        name: auth
        env: 
          - name: MONGO_URI
            valueFrom:
              secretKeyRef: 
                name: mongodb
                key: connectionString
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef: 
                name: jwt
                key: jwtSecret
          - name: JWT_EXPIRATION
            value: "3600"
          - name: TCP_PORT
            value: "4000"
          - name: HTTP_PORT
            value: "3000"
        ports:
        - containerPort: 4000 
        - containerPort: 3000
      