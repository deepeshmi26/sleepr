apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: payments
  name: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
      - image: asia-south1-docker.pkg.dev/sleepr-485709/payments/production
        name: payments
        env: 
          - name: TCP_PORT
            value: "4000"
          - name: NOTIFICATIONS_HOST
            value: notifications
          - name: NOTIFICATIONS_PORT
            value: "4000"
          - name: STRIPE_SECRET_KEY
            valueFrom:
              secretKeyRef: 
                name: stripe
                key: apiKey
        ports:
          - containerPort: 4000
        